<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SEMO 개인정보처리방침</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #667085;
      --border: #e5e7eb;
      --accent: #2563eb;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR",
        "Apple SD Gothic Neo", Roboto, Arial, sans-serif;
      line-height: 1.7;
    }

    main {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 18px 48px;
    }

    article {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 12px 32px rgba(15, 23, 42, 0.06);
    }

    .toolbar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 16px;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: keep-all;
      overflow-wrap: anywhere;
      font: inherit;
    }

    .fallback {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      main {
        padding: 18px 12px 32px;
      }

      article {
        padding: 20px;
        border-radius: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <article>
      <div class="toolbar">
        <a href="./PRIVACY-POLISH.md">Markdown 원문 보기</a>
      </div>
      <pre id="policy" class="fallback">개인정보처리방침을 불러오는 중입니다.</pre>
    </article>
  </main>
  <script>
    const target = document.getElementById('policy');

    fetch('./PRIVACY-POLISH.md', { cache: 'no-cache' })
      .then((response) => {
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        return response.text();
      })
      .then((text) => {
        target.classList.remove('fallback');
        target.textContent = text;
      })
      .catch(() => {
        target.textContent =
          '개인정보처리방침을 불러오지 못했습니다. 상단의 Markdown 원문 보기 링크를 이용해 주세요.';
      });
  </script>
</body>
</html>
